<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Облік витрат</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f8fa;--bg3:#f0f2f5;
  --text:#111;--text2:#555;--text3:#999;
  --border:#e5e7eb;--border2:#d1d5db;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-text:#1d4ed8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-text:#b45309;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#b91c1c;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-text:#6d28d9;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--text);font-size:14px;line-height:1.5}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
button{font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);padding:8px 14px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
button:hover{background:var(--bg3)}
button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
button.primary:hover{background:#1d4ed8}
button.danger{background:var(--red-bg);color:var(--red-text);border-color:var(--red)}
button.danger:hover{background:var(--red);color:#fff}
button:active{transform:scale(.97)}
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:10}
.topbar-logo{font-size:15px;font-weight:600}
.user-chip{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;font-size:13px;margin-left:auto}
.user-chip:hover{background:var(--bg2)}
.layout{display:flex;flex:1}
.sidebar{width:210px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);padding:12px 8px;display:flex;flex-direction:column;gap:2px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue-text);font-weight:500}
.nav-item i{font-size:17px;flex-shrink:0}
.nav-sep{height:1px;background:var(--border);margin:6px 4px}
.nav-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:4px 10px}
.main{flex:1;padding:24px;max-width:1000px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1rem}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.metric .ml{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric .mv{font-size:22px;font-weight:700}
.metric .ms{font-size:11px;color:var(--text3);margin-top:2px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field{margin-bottom:.75rem}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:600;font-size:12px;color:var(--text2);border-bottom:2px solid var(--border);background:var(--bg2);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;gap:4px}
.b-paid{background:var(--green-bg);color:var(--green-text)}
.b-unpaid{background:var(--red-bg);color:var(--red-text)}
.b-partial{background:var(--amber-bg);color:var(--amber-text)}
.b-usd{background:#eff6ff;color:#1e40af}
.b-eur{background:#f0fdf4;color:#065f46}
.b-uah{background:#fffbeb;color:#854d0e}
.b-admin{background:var(--purple-bg);color:var(--purple-text)}
.b-manager{background:var(--blue-bg);color:var(--blue-text)}
.b-viewer{background:var(--bg3);color:var(--text2)}
.action-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:3px 5px;border-radius:4px;line-height:1}
.action-btn:hover{color:var(--text);background:var(--bg3)}
.action-btn.danger:hover{color:var(--red);background:var(--red-bg)}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg2);padding:2rem}
.login-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center}
.login-icon{width:52px;height:52px;background:var(--blue-bg);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:24px;color:var(--blue-text)}
.pw-wrap{position:relative;text-align:left}
.pw-wrap input{padding-right:40px}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--bg);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.16);max-height:90vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-head h3{font-size:15px;font-weight:600}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:3rem;color:var(--text2);font-size:13px}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3)}
.empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.4}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.chart-wrap{position:relative;height:280px;margin-top:.5rem}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-row select,.filter-row input{width:auto;font-size:13px;padding:6px 10px}
.access-denied{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:.75rem}
.access-denied i{font-size:40px}
.pending-banner{background:var(--amber-bg);border:1px solid var(--amber);border-radius:var(--radius);padding:12px 16px;margin-bottom:1rem;font-size:13px;color:var(--amber-text);display:flex;align-items:center;gap:8px}
@media(max-width:640px){.sidebar{display:none}.frow,.frow3{grid-template-columns:1fr}.main{padding:12px}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="modal-root"></div>
<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
// ============================================================
// FIREBASE CONFIG — ВСТАВТЕ СВІЙ
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAT6v2SnvXQEDir-_fKl4Vs4PQ6hrd2dCY",
  authDomain: "stat-expenses-ec9ad.firebaseapp.com",
  databaseURL: "https://stat-expenses-ec9ad-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "stat-expenses-ec9ad",
  storageBucket: "stat-expenses-ec9ad.firebasestorage.app",
  messagingSenderId: "572523632253",
  appId: "1:572523632253:web:d36cdd0ed96f96a9cf0314"
};
firebase.initializeApp(firebaseConfig);
const DB   = firebase.database();
const AUTH = firebase.auth();
const expRef      = DB.ref('expenses');
const usersRef    = DB.ref('users');
const settingsRef = DB.ref('settings');

// ============================================================
// КОНФІГУРАЦІЯ
// ============================================================
const ADMIN_EMAIL = 'contact@staterra.systems'; // головний адмін

const CATEGORIES = ['Сервер','Телефонія','Обслуговування','Зарплата','Оренда','Маркетинг','Інше'];
const CURRENCIES = ['USD','EUR','UAH'];
const RECURRENCE = ['Щомісяця','Щоквартально','Щорічно','Разова'];
const STATUSES   = ['Не оплачено','Оплачено','Частково'];
const ROLES      = {admin:'Адмін', manager:'Менеджер', viewer:'Перегляд'};

// Курси до USD (приблизні, адмін може змінити в налаштуваннях)
let rates = {USD:1, EUR:1.08, UAH:0.024};

// ============================================================
// СТАН
// ============================================================
let currentUser   = null; // Firebase Auth user
let userProfile   = null; // {role, name, approved}
let allExpenses   = [];
let allUsers      = {};
let filterMonth   = '';
let filterCat     = '';
let filterStatus  = '';
let filterCur     = '';
let sortField     = 'date';
let sortDir       = -1;

// ============================================================
// УТИЛІТИ
// ============================================================
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = iso => { try{const[y,m,d]=iso.split('-');return`${d}.${m}.${y}`}catch{return iso} };
const curSign = c => c==='USD'?'$':c==='EUR'?'€':'₴';
const fmtAmt  = (a,c) => `${curSign(c)}${Number(a).toLocaleString('uk-UA',{minimumFractionDigits:0,maximumFractionDigits:2})}`;
const toUSD   = (a,c) => Number(a) * (rates[c]||1);

function toast(msg,dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}
function modal(html){document.getElementById('modal-root').innerHTML=html}
function closeModal(){document.getElementById('modal-root').innerHTML=''}

const canEdit  = () => userProfile && ['admin','manager'].includes(userProfile.role);
const canAdmin = () => userProfile && userProfile.role === 'admin';

function getMonths() {
  const set = new Set(allExpenses.map(e=>e.date?e.date.slice(0,7):''));
  const now = new Date();
  for(let i=0;i<6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    set.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  return [...set].filter(Boolean).sort().reverse();
}

function filteredExpenses() {
  return allExpenses.filter(e => {
    if(filterMonth  && !e.date?.startsWith(filterMonth))  return false;
    if(filterCat    && e.category !== filterCat)           return false;
    if(filterStatus && e.status   !== filterStatus)        return false;
    if(filterCur    && e.currency !== filterCur)           return false;
    return true;
  }).sort((a,b) => {
    let va=a[sortField]||'', vb=b[sortField]||'';
    if(sortField==='amount'){va=toUSD(a.amount,a.currency);vb=toUSD(b.amount,b.currency);}
    return va<vb?-sortDir:va>vb?sortDir:0;
  });
}

// ============================================================
// FIREBASE AUTH + WHITELIST
// ============================================================
AUTH.onAuthStateChanged(async user => {
  if(!user){ currentUser=null; userProfile=null; render(); return; }
  currentUser = user;
  // Перевіряємо профіль
  const snap = await usersRef.child(user.uid).once('value');
  if(snap.exists()){
    userProfile = snap.val();
    // Якщо це адмін-email — автоматично даємо роль admin
    if(user.email === ADMIN_EMAIL && userProfile.role !== 'admin'){
      await usersRef.child(user.uid).update({role:'admin', approved:true});
      userProfile.role = 'admin'; userProfile.approved = true;
    }
  } else {
    // Новий користувач — створюємо запис, чекає апруву
    const isAdmin = user.email === ADMIN_EMAIL;
    userProfile = {
      name:     user.displayName || user.email.split('@')[0],
      email:    user.email,
      role:     isAdmin ? 'admin' : 'viewer',
      approved: isAdmin,
      createdAt: Date.now(),
    };
    await usersRef.child(user.uid).set(userProfile);
  }
  startListeners();
  render();
});

function startListeners(){
  const ratesSnap = settingsRef.child('rates').on('value', snap => {
    if(snap.val()) rates = {...rates, ...snap.val()};
  });
  usersRef.on('value', snap => { allUsers = snap.val()||{}; });
  expRef.on('value', snap => {
    const d = snap.val()||{};
    allExpenses = Object.entries(d).map(([fbKey,v])=>({...v,fbKey}));
    refreshPages();
  });
}

function stopListeners(){
  expRef.off(); usersRef.off(); settingsRef.off();
}

function refreshPages(){
  const active = document.querySelector('.nav-item.active');
  if(!active) return;
  const k = active.id.replace('nav-','');
  if(k==='expenses') renderExpenses();
  else if(k==='charts') renderCharts();
  else if(k==='users') renderUsers();
  else if(k==='settings') renderSettings();
}

// ============================================================
// RENDER ROOT
// ============================================================
function render(){
  document.getElementById('root').innerHTML='';
  if(!currentUser) { renderLogin(); return; }
  if(!userProfile?.approved){ renderPending(); return; }
  renderApp();
}

// ============================================================
// LOGIN
// ============================================================
function renderLogin(){
  document.getElementById('root').innerHTML=`
  <div class="login-screen">
    <div class="login-card">
      <div class="login-icon"><i class="ti ti-report-money" aria-hidden="true"></i></div>
      <h2 style="font-size:17px;margin-bottom:6px">Облік витрат</h2>
      <p style="color:var(--text2);font-size:13px;margin-bottom:1.5rem">Увійдіть через Google — доступ надається адміністратором</p>
      <button class="primary" onclick="loginGoogle()" style="width:100%;justify-content:center;gap:10px;padding:10px">
        <i class="ti ti-brand-google" aria-hidden="true"></i> Увійти через Google
      </button>
      <p style="margin-top:1rem;font-size:12px;color:var(--text3)">Після першого входу адмін підтверджує доступ і призначає роль</p>
    </div>
  </div>`;
}

async function loginGoogle(){
  try{
    const provider = new firebase.auth.GoogleAuthProvider();
    await AUTH.signInWithPopup(provider);
  } catch(e){ toast('Помилка входу: '+e.message); }
}

function renderPending(){
  document.getElementById('root').innerHTML=`
  <div class="login-screen">
    <div class="login-card">
      <div class="login-icon" style="background:var(--amber-bg);color:var(--amber-text)">
        <i class="ti ti-clock" aria-hidden="true"></i>
      </div>
      <h2 style="font-size:16px;margin-bottom:8px">Очікуємо підтвердження</h2>
      <p style="color:var(--text2);font-size:13px;margin-bottom:1.25rem">
        Ви увійшли як <strong>${currentUser.email}</strong>.<br>
        Адмін ще не підтвердив ваш доступ. Зверніться до адміністратора.
      </p>
      <button onclick="AUTH.signOut()" style="width:100%;justify-content:center">
        <i class="ti ti-logout" aria-hidden="true"></i> Вийти
      </button>
    </div>
  </div>`;
}

// ============================================================
// APP SHELL
// ============================================================
function renderApp(){
  const nav = [
    {k:'expenses', i:'ti-list',         l:'Витрати'},
    {k:'charts',   i:'ti-chart-bar',    l:'Графіки'},
  ];
  if(canAdmin()){
    nav.push({k:'users',    i:'ti-users',       l:'Користувачі'});
    nav.push({k:'settings', i:'ti-settings',    l:'Налаштування'});
  }

  const roleLabel = ROLES[userProfile.role]||userProfile.role;

  document.getElementById('root').innerHTML=`
  <div class="app">
    <div class="topbar">
      <i class="ti ti-report-money" style="font-size:20px;color:var(--blue)" aria-hidden="true"></i>
      <span class="topbar-logo">Облік витрат</span>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-left:auto;margin-right:14px">
        <div class="live-dot"></div><span>Реальний час</span>
      </div>
      <div class="user-chip" onclick="AUTH.signOut()">
        <img src="${currentUser.photoURL||''}" onerror="this.style.display='none'" style="width:22px;height:22px;border-radius:50%">
        <span>${userProfile.name||currentUser.email}</span>
        <span class="badge b-${userProfile.role}" style="font-size:10px">${roleLabel}</span>
        <i class="ti ti-logout" style="font-size:13px;color:var(--text3)" aria-hidden="true"></i>
      </div>
    </div>
    <div class="layout">
      <nav class="sidebar">
        ${nav.map((n,i)=>`
        <button class="nav-item${i===0?' active':''}" id="nav-${n.k}" onclick="navTo('${n.k}')">
          <i class="ti ${n.i}" aria-hidden="true"></i>${n.l}
        </button>`).join('')}
      </nav>
      <div class="main">
        ${nav.map((n,i)=>`<div id="pg-${n.k}" style="display:${i===0?'block':'none'}"></div>`).join('')}
      </div>
    </div>
  </div>`;

  renderExpenses();
  renderCharts();
  if(canAdmin()){ renderUsers(); renderSettings(); }
}

function navTo(k){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.id==='nav-'+k));
  document.querySelectorAll('[id^="pg-"]').forEach(p=>p.style.display=p.id==='pg-'+k?'block':'none');
}

// ============================================================
// ВИТРАТИ
// ============================================================
function renderExpenses(){
  const pg=document.getElementById('pg-expenses');if(!pg)return;
  const exps = filteredExpenses();
  const months = getMonths();

  // Підрахунок підсумків у USD
  const totalUSD = exps.reduce((s,e)=>s+toUSD(e.amount||0,e.currency||'USD'),0);
  const unpaidUSD = exps.filter(e=>e.status!=='Оплачено').reduce((s,e)=>s+toUSD(e.amount||0,e.currency||'USD'),0);
  const paidUSD   = exps.filter(e=>e.status==='Оплачено').reduce((s,e)=>s+toUSD(e.amount||0,e.currency||'USD'),0);

  pg.innerHTML=`
  ${canEdit()?`
  <div class="card">
    <div class="card-title"><i class="ti ti-circle-plus" aria-hidden="true"></i> Новий запис витрати</div>
    <div class="frow">
      <div class="field"><label>Стаття витрат</label><input type="text" id="e-title" placeholder="Оплата сервера Hetzner"></div>
      <div class="field"><label>Категорія</label>
        <select id="e-cat">${CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
    </div>
    <div class="frow3">
      <div class="field"><label>Сума</label><input type="number" id="e-amount" placeholder="0" min="0" step="0.01"></div>
      <div class="field"><label>Валюта</label>
        <select id="e-cur">${CURRENCIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Статус</label>
        <select id="e-status">${STATUSES.map(s=>`<option>${s}</option>`).join('')}</select></div>
    </div>
    <div class="frow">
      <div class="field"><label>Дата</label><input type="date" id="e-date" value="${today()}"></div>
      <div class="field"><label>Повторюваність</label>
        <select id="e-rec">${RECURRENCE.map(r=>`<option>${r}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Коментар</label><textarea id="e-comment" rows="2" placeholder="Деталі, залишок на рахунку тощо..."></textarea></div>
    <button class="primary" onclick="addExpense()"><i class="ti ti-plus" aria-hidden="true"></i> Додати витрату</button>
  </div>`:''}

  <div class="metrics">
    <div class="metric"><div class="ml">Всього (USD екв.)</div><div class="mv">$${Math.round(totalUSD).toLocaleString('uk-UA')}</div><div class="ms">${exps.length} записів</div></div>
    <div class="metric"><div class="ml">Оплачено</div><div class="mv" style="color:var(--green-text)">$${Math.round(paidUSD).toLocaleString('uk-UA')}</div><div class="ms">${exps.filter(e=>e.status==='Оплачено').length} позицій</div></div>
    <div class="metric"><div class="ml">Не оплачено</div><div class="mv" style="color:var(--red-text)">$${Math.round(unpaidUSD).toLocaleString('uk-UA')}</div><div class="ms">${exps.filter(e=>e.status!=='Оплачено').length} позицій</div></div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;flex-wrap:wrap;gap:8px">
      <span class="card-title" style="margin:0"><i class="ti ti-list" aria-hidden="true"></i> Витрати (${exps.length})</span>
      <button onclick="exportCSV()" style="font-size:12px;padding:6px 10px"><i class="ti ti-download" aria-hidden="true"></i> Експорт CSV</button>
    </div>
    <div class="filter-row">
      <select onchange="filterMonth=this.value;renderExpenses()" style="min-width:130px">
        <option value="">Всі місяці</option>
        ${months.map(m=>`<option value="${m}" ${filterMonth===m?'selected':''}>${m}</option>`).join('')}
      </select>
      <select onchange="filterCat=this.value;renderExpenses()">
        <option value="">Всі категорії</option>
        ${CATEGORIES.map(c=>`<option value="${c}" ${filterCat===c?'selected':''}>${c}</option>`).join('')}
      </select>
      <select onchange="filterStatus=this.value;renderExpenses()">
        <option value="">Всі статуси</option>
        ${STATUSES.map(s=>`<option value="${s}" ${filterStatus===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select onchange="filterCur=this.value;renderExpenses()">
        <option value="">Всі валюти</option>
        ${CURRENCIES.map(c=>`<option value="${c}" ${filterCur===c?'selected':''}>${c}</option>`).join('')}
      </select>
      ${filterMonth||filterCat||filterStatus||filterCur?`<button onclick="filterMonth='';filterCat='';filterStatus='';filterCur='';renderExpenses()" style="font-size:12px;padding:6px 10px"><i class="ti ti-x" aria-hidden="true"></i> Скинути</button>`:''}
    </div>
    ${!exps.length?`<div class="empty"><i class="ti ti-receipt-off" aria-hidden="true"></i>Витрат немає</div>`:`
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="toggleSort('date')">Дата ${sortIcon('date')}</th>
        <th onclick="toggleSort('title')">Стаття ${sortIcon('title')}</th>
        <th>Категорія</th>
        <th onclick="toggleSort('amount')">Сума ${sortIcon('amount')}</th>
        <th>Повторення</th>
        <th>Статус</th>
        <th>Коментар</th>
        ${canEdit()?'<th></th>':''}
      </tr></thead>
      <tbody>${exps.map(e=>`<tr>
        <td style="white-space:nowrap;color:var(--text2)">${fmtDate(e.date||'')}</td>
        <td style="font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.title||''}">${e.title||'—'}</td>
        <td><span class="badge" style="background:var(--bg3);color:var(--text2)">${e.category||'—'}</span></td>
        <td style="white-space:nowrap">
          <span style="font-weight:700">${fmtAmt(e.amount||0, e.currency||'USD')}</span>
          <span class="badge b-${(e.currency||'USD').toLowerCase()}" style="margin-left:4px">${e.currency||'USD'}</span>
        </td>
        <td style="color:var(--text2);font-size:12px">${e.recurrence||'—'}</td>
        <td><span class="badge b-${e.status==='Оплачено'?'paid':e.status==='Частково'?'partial':'unpaid'}">${e.status||'—'}</span></td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);font-size:12px" title="${e.comment||''}">${e.comment||'—'}</td>
        ${canEdit()?`<td style="white-space:nowrap">
          <button class="action-btn" onclick="openEditExp('${e.fbKey}')" aria-label="Редагувати"><i class="ti ti-edit" aria-hidden="true"></i></button>
          ${canAdmin()?`<button class="action-btn danger" onclick="delExp('${e.fbKey}')" aria-label="Видалити"><i class="ti ti-trash" aria-hidden="true"></i></button>`:''}
        </td>`:''}
      </tr>`).join('')}</tbody>
    </table></div>`}
  </div>`;
}

function toggleSort(f){
  if(sortField===f) sortDir*=-1; else {sortField=f;sortDir=-1;}
  renderExpenses();
}
function sortIcon(f){ return sortField===f?(sortDir===-1?'↓':'↑'):''; }

// ============================================================
// ГРАФІКИ
// ============================================================
function renderCharts(){
  const pg=document.getElementById('pg-charts');if(!pg)return;
  pg.innerHTML=`
  <div class="card">
    <div class="card-title"><i class="ti ti-chart-bar" aria-hidden="true"></i> Витрати по місяцях (USD еквівалент)</div>
    <div class="chart-wrap"><canvas id="chart-monthly"></canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
    <div class="card">
      <div class="card-title"><i class="ti ti-chart-pie" aria-hidden="true"></i> По категоріях</div>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-cat"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-chart-donut" aria-hidden="true"></i> По статусах</div>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-status"></canvas></div>
    </div>
  </div>`;

  // Monthly bar chart
  const monthMap = {};
  allExpenses.forEach(e=>{
    const m = e.date?.slice(0,7)||'';
    if(!m) return;
    monthMap[m] = (monthMap[m]||0) + toUSD(e.amount||0, e.currency||'USD');
  });
  const months = Object.keys(monthMap).sort().slice(-8);
  new Chart(document.getElementById('chart-monthly'),{
    type:'bar',
    data:{
      labels: months.map(m=>{const[y,mo]=m.split('-');return`${mo}.${y}`}),
      datasets:[{
        label:'Витрати (USD)',
        data: months.map(m=>Math.round(monthMap[m]||0)),
        backgroundColor:'rgba(37,99,235,.7)',
        borderRadius:6,
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
  });

  // Category pie
  const catMap={};
  allExpenses.forEach(e=>{ catMap[e.category||'Інше']=(catMap[e.category||'Інше']||0)+toUSD(e.amount||0,e.currency||'USD'); });
  const catColors=['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#ea580c','#64748b'];
  const catKeys=Object.keys(catMap);
  new Chart(document.getElementById('chart-cat'),{
    type:'doughnut',
    data:{labels:catKeys,datasets:[{data:catKeys.map(k=>Math.round(catMap[k])),backgroundColor:catColors,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11}}}}}
  });

  // Status pie
  const stMap={Оплачено:0,'Не оплачено':0,Частково:0};
  allExpenses.forEach(e=>{ stMap[e.status||'Не оплачено']=(stMap[e.status||'Не оплачено']||0)+toUSD(e.amount||0,e.currency||'USD'); });
  new Chart(document.getElementById('chart-status'),{
    type:'doughnut',
    data:{labels:Object.keys(stMap),datasets:[{data:Object.values(stMap).map(Math.round),backgroundColor:['#16a34a','#dc2626','#d97706'],borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11}}}}}
  });
}

// ============================================================
// КОРИСТУВАЧІ (АДМІН)
// ============================================================
function renderUsers(){
  const pg=document.getElementById('pg-users');if(!pg)return;
  const users=Object.entries(allUsers);
  pg.innerHTML=`
  <div class="card">
    <div class="card-title"><i class="ti ti-users" aria-hidden="true"></i> Управління доступом (${users.length}/4)</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">
      Після входу нового користувача через Google — він з'являється тут зі статусом "Очікує". Призначте роль і підтвердьте доступ.
    </p>
    ${!users.length?`<div class="empty"><i class="ti ti-user-off" aria-hidden="true"></i>Користувачів немає</div>`:`
    <div class="tbl-wrap"><table>
      <thead><tr><th>Користувач</th><th>Email</th><th>Роль</th><th>Статус</th><th></th></tr></thead>
      <tbody>${users.map(([uid,u])=>`<tr>
        <td style="font-weight:500">${u.name||'—'}</td>
        <td style="color:var(--text2)">${u.email||'—'}</td>
        <td>
          <select onchange="changeRole('${uid}',this.value)" ${u.email===ADMIN_EMAIL?'disabled':''} style="width:auto;font-size:12px;padding:4px 8px">
            ${Object.entries(ROLES).map(([k,v])=>`<option value="${k}" ${u.role===k?'selected':''}>${v}</option>`).join('')}
          </select>
        </td>
        <td>${u.approved
          ?`<span class="badge b-paid"><i class="ti ti-check" aria-hidden="true"></i> Підтверджено</span>`
          :`<span class="badge b-unpaid"><i class="ti ti-clock" aria-hidden="true"></i> Очікує</span>`}
        </td>
        <td style="white-space:nowrap">
          ${!u.approved?`<button class="primary" onclick="approveUser('${uid}')" style="font-size:12px;padding:5px 10px"><i class="ti ti-check" aria-hidden="true"></i> Підтвердити</button>`:''}
          ${u.email!==ADMIN_EMAIL?`<button class="action-btn danger" onclick="removeUser('${uid}')" aria-label="Видалити"><i class="ti ti-trash" aria-hidden="true"></i></button>`:''}
        </td>
      </tr>`).join('')}</tbody>
    </table></div>`}
  </div>`;
}

async function approveUser(uid){
  await usersRef.child(uid).update({approved:true});
  toast('Доступ підтверджено');
}
async function changeRole(uid, role){
  await usersRef.child(uid).update({role});
  toast('Роль змінено');
}
async function removeUser(uid){
  if(!confirm('Видалити користувача?')) return;
  await usersRef.child(uid).remove();
  toast('Видалено');
}

// ============================================================
// НАЛАШТУВАННЯ
// ============================================================
function renderSettings(){
  const pg=document.getElementById('pg-settings');if(!pg)return;
  pg.innerHTML=`
  <div class="card">
    <div class="card-title"><i class="ti ti-currency-dollar" aria-hidden="true"></i> Курси валют (відносно USD)</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Використовуються для розрахунку загальних сум у доларовому еквіваленті.</p>
    <div class="frow3">
      <div class="field"><label>EUR → USD</label><input type="number" id="r-eur" value="${rates.EUR}" step="0.001" min="0"></div>
      <div class="field"><label>UAH → USD</label><input type="number" id="r-uah" value="${rates.UAH}" step="0.0001" min="0"></div>
      <div style="display:flex;align-items:flex-end;padding-bottom:.75rem">
        <button class="primary" onclick="saveRates()"><i class="ti ti-check" aria-hidden="true"></i> Зберегти курси</button>
      </div>
    </div>
    <p style="font-size:12px;color:var(--text3)">Поточний курс: 1 EUR = ${rates.EUR} USD · 1 UAH = ${rates.UAH} USD</p>
  </div>`;
}

async function saveRates(){
  const eur = parseFloat(document.getElementById('r-eur').value)||1.08;
  const uah = parseFloat(document.getElementById('r-uah').value)||0.024;
  rates = {USD:1, EUR:eur, UAH:uah};
  await settingsRef.child('rates').set(rates);
  toast('Курси збережено');
  renderSettings();
  renderExpenses();
}

// ============================================================
// CRUD — ВИТРАТИ
// ============================================================
async function addExpense(){
  const title   = document.getElementById('e-title').value.trim();
  const amount  = parseFloat(document.getElementById('e-amount').value)||0;
  const currency= document.getElementById('e-cur').value;
  const status  = document.getElementById('e-status').value;
  const date    = document.getElementById('e-date').value||today();
  const category= document.getElementById('e-cat').value;
  const rec     = document.getElementById('e-rec').value;
  const comment = document.getElementById('e-comment').value.trim();

  if(!title){ toast('Вкажіть назву витрати'); return; }
  if(!amount){ toast('Вкажіть суму'); return; }

  await expRef.push({title,amount,currency,status,date,category,recurrence:rec,comment,
    createdBy: currentUser.uid, createdAt: Date.now()});

  document.getElementById('e-title').value='';
  document.getElementById('e-amount').value='';
  document.getElementById('e-comment').value='';
  toast('Витрату додано ✓');
}

async function delExp(fbKey){
  if(!confirm('Видалити цей запис?')) return;
  await expRef.child(fbKey).remove();
  toast('Видалено');
}

function openEditExp(fbKey){
  const e=allExpenses.find(x=>x.fbKey===fbKey);if(!e)return;
  modal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-head">
        <h3><i class="ti ti-edit" aria-hidden="true"></i> Редагування витрати</h3>
        <button class="action-btn" onclick="closeModal()" aria-label="Закрити"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>
      <div class="field"><label>Стаття витрат</label><input type="text" id="ed-title" value="${e.title||''}"></div>
      <div class="frow">
        <div class="field"><label>Категорія</label>
          <select id="ed-cat">${CATEGORIES.map(c=>`<option ${e.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="field"><label>Дата</label><input type="date" id="ed-date" value="${e.date||today()}"></div>
      </div>
      <div class="frow3">
        <div class="field"><label>Сума</label><input type="number" id="ed-amount" value="${e.amount||0}" step="0.01"></div>
        <div class="field"><label>Валюта</label>
          <select id="ed-cur">${CURRENCIES.map(c=>`<option ${e.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="field"><label>Статус</label>
          <select id="ed-status">${STATUSES.map(s=>`<option ${e.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Повторюваність</label>
        <select id="ed-rec">${RECURRENCE.map(r=>`<option ${e.recurrence===r?'selected':''}>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Коментар</label><textarea id="ed-comment" rows="2">${e.comment||''}</textarea></div>
      <div style="display:flex;gap:8px;margin-top:1rem">
        <button class="primary" onclick="saveEditExp('${fbKey}')" style="flex:1"><i class="ti ti-check" aria-hidden="true"></i> Зберегти</button>
        <button onclick="closeModal()" style="flex:1"><i class="ti ti-x" aria-hidden="true"></i> Скасувати</button>
      </div>
    </div>
  </div>`);
}

async function saveEditExp(fbKey){
  await expRef.child(fbKey).update({
    title:      document.getElementById('ed-title').value.trim(),
    category:   document.getElementById('ed-cat').value,
    date:       document.getElementById('ed-date').value,
    amount:     parseFloat(document.getElementById('ed-amount').value)||0,
    currency:   document.getElementById('ed-cur').value,
    status:     document.getElementById('ed-status').value,
    recurrence: document.getElementById('ed-rec').value,
    comment:    document.getElementById('ed-comment').value.trim(),
    updatedBy:  currentUser.uid,
    updatedAt:  Date.now(),
  });
  closeModal(); toast('Збережено ✓');
}

// ============================================================
// ЕКСПОРТ CSV
// ============================================================
function exportCSV(){
  const exps = filteredExpenses();
  const rows = [['Дата','Стаття','Категорія','Сума','Валюта','USD екв.','Повторення','Статус','Коментар']];
  exps.forEach(e=>{
    rows.push([e.date||'',e.title||'',e.category||'',e.amount||0,e.currency||'USD',
      Math.round(toUSD(e.amount||0,e.currency||'USD')),e.recurrence||'',e.status||'',e.comment||'']);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`витрати_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('CSV завантажено ✓');
}

// ============================================================
// СТАРТ
// ============================================================
render();
</script>
